# 홈페이지 모듈/실습 구성 데이터
# 새로운 섹션을 추가하려면 이 파일에 모듈 블록을 추가하고 labs/ 폴더에 페이지를 만드세요.
# version: classic = 정식 출시(Classic) Copilot Studio / new = 신규(Public Preview)

- id: agentacademy
  version: classic
  title: AgentAcademy — 커스텀 에이전트 초급
  icon: "🎓"
  badge: Workshop
  accent: "#0078D4"
  description: >-
    채용 에이전트를 예제로 Copilot Studio의 핵심 기능을 단계별로 학습합니다.
    원 출처는 Microsoft Agent Academy Operative.
  labs:
    - title: "A1 · 채용 에이전트 시작하기"
      url: /labs/agentacademy-a1/
      level: 100
      time: "20분"
      summary: 기본 인프라 배포 및 중앙 오케스트레이터 에이전트 생성.
      tags: [Introduction, Provisioning]
    - title: "A2 · 에이전트 모델 이해"
      url: /labs/agentacademy-a2/
      level: 200
      time: "25분"
      summary: 사용 사례에 최적화된 AI 모델 선택과 성능 특성 비교.
      tags: [Models, Optimization]
    - title: "A3 · 멀티 에이전트"
      url: /labs/agentacademy-a3/
      level: 300
      time: "40분"
      summary: Child Agent vs Connected Agent — 확장 가능한 멀티 에이전트 아키텍처.
      tags: [Multi-Agent, Architecture]
    - title: "A4 · MCP 서버 연결"
      url: /labs/agentacademy-a4/
      level: 300
      time: "30분"
      summary: Model Context Protocol(MCP) 서버를 Copilot Studio 에이전트에 통합.
      tags: [MCP, Tools]

- id: agentthon
