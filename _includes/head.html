<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0078D4">
{% if page.title %}
  {% assign page_title = page.title | append: " · " | append: site.title %}
{% else %}
  {% assign page_title = site.title | append: " — " | append: site.tagline %}
{% endif %}
<title>{{ page_title }}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
{% feed_meta %}
